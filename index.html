<script>

/* ===============================
   START FROM ₹350 ONLY
================================ */

let labels = ["Start"];
let sharePrice = 350;
let dataPoints = [350];

/* ===============================
   CREATE CHART
================================ */

const ctx = document.getElementById('shareChart').getContext('2d');

const shareChart = new Chart(ctx, {
type: 'line',
data: {
labels: labels,
datasets: [{
label: 'CARELOOP NSE Share Price',
data: dataPoints,
borderColor: '#2e7d32',
backgroundColor: 'rgba(46,125,50,0.15)',
fill: true,
tension: 0.4
}]
},
options: {
responsive: true,
animation: true,
scales: {
y: {
beginAtZero: false
}
}
}
});

/* ===============================
   LIVE MOVEMENT
================================ */

let step = 0;

setInterval(()=>{

    step++;

    let trend = 2;

    // Simulate 2025 rally
    if(step > 20 && step < 35){
        trend = 10;
    }

    // Simulate crash
    if(step >=35 && step < 50){
        trend = -12;
    }

    // Recovery
    if(step >=50){
        trend = 4;
    }

    let fluctuation = (Math.random() - 0.5) * 6;

    sharePrice += trend + fluctuation;

    if(sharePrice < 300){
        sharePrice = 300;
    }

    if(sharePrice > 820){
        sharePrice = 820;
    }

    document.getElementById("sharePrice").textContent =
        "₹ " + sharePrice.toFixed(2);

    labels.push(step.toString());
    dataPoints.push(parseFloat(sharePrice.toFixed(2)));

    if(labels.length > 60){
        labels.shift();
        dataPoints.shift();
    }

    shareChart.update();

},1000);

</script>

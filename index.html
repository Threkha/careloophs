<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Careloop Live Share</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#667eea;
}
.container{
    background:white;
    width:90%;
    max-width:900px;
    margin:50px auto;
    padding:30px;
    border-radius:15px;
}
#sharePrice{
    font-size:26px;
    font-weight:bold;
    margin-bottom:20px;
}
canvas{
    height:400px !important;
}
</style>
</head>
<body>

<div class="container">
<h2>📈 Careloop Live Share Value</h2>
<div id="sharePrice">₹ 350.00</div>
<canvas id="chart"></canvas>
</div>

<script>
window.onload = function() {

if (typeof Chart === "undefined") {
    document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:50px;'>Chart.js failed to load. Check internet connection.</h2>";
    return;
}

let price = 350;
let labels = [0];
let values = [350];
let step = 0;

const ctx = document.getElementById("chart");

const chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "CARELOOP Share Price",
            data: values,
            borderColor: "green",
            backgroundColor: "rgba(0,128,0,0.2)",
            fill: true,
            tension: 0.4
        }]
    },
    options: {
        responsive: true,
        animation: false,
        scales: {
            y: { beginAtZero: false }
        }
    }
});

setInterval(function(){

    step++;

    // smooth realistic wave movement
    let wave = Math.sin(step / 8) * 3;
    let random = (Math.random() - 0.5) * 4;

    price += wave + random;

    if(price < 300) price = 300;
    if(price > 850) price = 850;

    document.getElementById("sharePrice").innerText =
        "₹ " + price.toFixed(2);

    labels.push(step);
    values.push(price.toFixed(2));

    if(labels.length > 60){
        labels.shift();
        values.shift();
    }

    chart.update();

}, 1000);

};
</script>

</body>
</html>
